services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: always
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"
    volumes:
      - kuma_data:/app/data
    environment:
      - TZ=Europe/Paris
      - UMASK=0022
    networks:
      - backend
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=myresolver"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=3001"
      # Block scanners
      - "traefik.http.middlewares.block-scan.redirectregex.regex=^/(\\.git|\\.e\
        nv|\\.DS_Store|v2/_catalog|server-status|setup|console).*"
      - "traefik.http.middlewares.block-scan.redirectregex.replacement=/"
      - "traefik.http.middlewares.block-scan.redirectregex.permanent=false"
      # Middlewares
      - "traefik.http.routers.${APP_NAME}.middlewares=block-scan@docker,compres\
        s@docker,security-headers@file"
      # Gzip compression
      - "traefik.http.middlewares.compress.compress=true"
      # Timeouts
      - "traefik.http.serversTransports.${APP_NAME}-transport.forwardingTimeout\
        s.dialTimeout=60s"
      - "traefik.http.serversTransports.${APP_NAME}-transport.forwardingTimeout\
        s.responseHeaderTimeout=300s"
      - "traefik.http.serversTransports.${APP_NAME}-transport.forwardingTimeout\
        s.idleConnTimeout=300s"

  db:
    image: mariadb:12.3
    container_name: db
    expose:
      - "3306"
    restart: always
    volumes:
      - db_data:/var/lib/mysql
      - ./db/my.cnf:/etc/mysql/my.cnf
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--innodb-read-only-compressed=OFF"
    env_file: .env
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Resolver
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # Providers
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
    labels:
      # Security headers
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains\
        =true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=t\
        rue"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      # Cache static assets
      - "traefik.http.middlewares.cache-headers.headers.customresponseheaders.C\
        ache-Control=public, max-age=31536000"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./traefik/acme.json:/letsencrypt/acme.json"
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - web

volumes:
  db_data:
  kuma_data:

networks:
  backend:
    internal: true
  web:
    driver: bridge
